services:
  - type: web
    name: evergrow-agents
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # These must be set manually in the Render dashboard:
      # - NEXT_PUBLIC_SUPABASE_URL
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY
      # - SUPABASE_SERVICE_ROLE_KEY
      # - ANTHROPIC_API_KEY
      # - MICROSOFT_CLIENT_ID
      # - MICROSOFT_CLIENT_SECRET
      # - MICROSOFT_TENANT_ID
      # - CRON_SECRET
    healthCheckPath: /api/agents
    numInstances: 1
